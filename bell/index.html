<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bjelle – e_music_tools</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .bell-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ---- bell icon ---- */
    .bell-icon {
      font-size: 7rem;
      line-height: 1;
      display: block;
      transition: transform .15s;
      transform-origin: center top;
      cursor: pointer;
      user-select: none;
    }
    .bell-icon.ring {
      animation: bell-swing .5s ease-in-out;
    }
    @keyframes bell-swing {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(-18deg); }
      40%  { transform: rotate(18deg); }
      60%  { transform: rotate(-12deg); }
      80%  { transform: rotate(8deg); }
      100% { transform: rotate(0deg); }
    }

    /* ---- status message ---- */
    .status-msg {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.5em;
      transition: color .2s;
    }
    .status-msg.active { color: var(--accent); }

    /* ---- shake meter bar ---- */
    .shake-meter-wrap {
      width: 100%;
      max-width: 320px;
    }
    .shake-meter-wrap label {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .shake-bar-track {
      height: 10px;
      border-radius: 5px;
      background: var(--surface);
      overflow: hidden;
    }
    .shake-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      background: var(--accent2);
      transition: width .08s linear, background .15s;
    }
    .shake-bar-fill.over { background: var(--accent); }

    /* ---- sliders ---- */
    .slider-row {
      width: 100%;
      max-width: 320px;
    }
    .slider-row label {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    /* ---- ring button ---- */
    .ring-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .ring-btn-wrap small {
      font-size: .78rem;
      color: var(--muted);
    }

    /* ---- permission note ---- */
    .permission-note {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="../index.html">🎵</a>
    <a href="../metronome/">Metronom</a>
    <a href="../tuner/">Stemming</a>
    <a href="../guitar-tuner/">Gitarstemming</a>
    <a href="../piano/">Piano</a>
    <a href="../drumkit/">Trommesett</a>
    <a href="../bell/" class="active">Bjelle</a>
  </nav>

  <main>
    <div class="card">
      <div class="bell-wrap">

        <!-- bell visual -->
        <span class="bell-icon" id="bellIcon" title="Klikk for å ringe" role="button" aria-label="Ring bjellen">🔔</span>

        <!-- status -->
        <div class="status-msg" id="statusMsg">Rist telefonen for å ringe bjellen!</div>

        <!-- shake meter -->
        <div class="shake-meter-wrap">
          <label><span>Riste-styrke</span><span id="shakeVal">0</span></label>
          <div class="shake-bar-track">
            <div class="shake-bar-fill" id="shakeBar"></div>
          </div>
        </div>

        <!-- sensitivity slider -->
        <div class="slider-row">
          <label><span>Følsomhet</span><span id="sensLabel">Middels</span></label>
          <input type="range" id="sensSlider" min="1" max="5" value="3" step="1" />
        </div>

        <!-- frequency slider -->
        <div class="slider-row">
          <label><span>🎵 Frekvens</span><span id="freqLabel"></span></label>
          <input type="range" id="freqSlider" min="200" max="2000" step="1" value="523" />
        </div>

        <!-- volume slider -->
        <div class="slider-row">
          <label><span>🔈 Volum</span><span>🔊</span></label>
          <input type="range" id="volSlider" min="0" max="100" value="80" />
        </div>

        <!-- manual ring button -->
        <div class="ring-btn-wrap">
          <button class="btn btn-primary" id="btnRing">🔔 Ring bjellen</button>
          <small>Eller rist telefonen</small>
        </div>

        <!-- iOS permission note -->
        <p class="permission-note" id="permNote" hidden>
          På iOS 13+ må du gi tillatelse til bevegelsessensor.<br>
          <button class="btn btn-secondary" id="btnPermission" style="margin-top:.6rem">Gi tillatelse</button>
        </p>

      </div>
    </div>
  </main>

  <script>
  (() => {
    'use strict';

    /* ============================================================
       Audio context + bell synthesis (physical model)
       Inharmonic partials (f, 2.756f, 5.404f, …) are kept as
       persistent oscillators. On each strike, the current decaying
       amplitude of each partial is computed and the new impact
       energy is added on top – just like a real bell that is struck
       while still ringing.
       ============================================================ */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let volume = 0.8;
    let fundamental = 523.25; // C5 – controllable via frequency slider

    // Inharmonic partial ratios, amplitudes and decay times for a typical bell
    const PARTIALS = [
      { ratio: 1.000, amp: 1.00, decay: 4.0 },
      { ratio: 2.756, amp: 0.50, decay: 2.5 },
      { ratio: 5.404, amp: 0.25, decay: 1.8 },
      { ratio: 8.933, amp: 0.12, decay: 1.2 },
      { ratio: 13.35, amp: 0.06, decay: 0.8 },
    ];

    // Physical model state: persistent oscillators + per-partial amplitude tracking
    let masterGainNode = null;
    let physModel = null; // Array of { osc, gain, trigAmp, trigTime }

    function initAudio() {
      if (physModel) return;
      masterGainNode = audioCtx.createGain();
      masterGainNode.gain.value = volume;
      masterGainNode.connect(audioCtx.destination);
      physModel = PARTIALS.map(({ ratio }) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = fundamental * ratio;
        gain.gain.value = 0;
        osc.connect(gain);
        gain.connect(masterGainNode);
        osc.start();
        return { osc, gain, trigAmp: 0, trigTime: -Infinity };
      });
    }

    // Returns the amplitude still present in partial i at audioCtx.currentTime
    // based on how the Web Audio exponential ramp decays:
    //   value(t) = startAmp * (0.0001 / startAmp) ^ (elapsed / decay)
    function getResidualAmp(trigAmp, trigTime, decay) {
      if (trigAmp <= 0) return 0;
      const elapsed = audioCtx.currentTime - trigTime;
      if (elapsed <= 0) return trigAmp;
      if (elapsed >= decay) return 0;
      return Math.pow(trigAmp, 1 - elapsed / decay) * Math.pow(0.0001, elapsed / decay);
    }

    function ringBell() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      initAudio();
      const t = audioCtx.currentTime;
      masterGainNode.gain.setValueAtTime(volume, t);

      PARTIALS.forEach(({ amp, decay }, i) => {
        const m = physModel[i];
        // Add new strike energy on top of whatever amplitude is still ringing
        const residual = getResidualAmp(m.trigAmp, m.trigTime, decay);
        // Cap at 2.0 (double the fundamental's amp) to prevent clipping on rapid re-strikes
        const newAmp = Math.min(2.0, residual + amp);
        m.trigAmp = newAmp;
        m.trigTime = t;
        m.gain.gain.cancelScheduledValues(t);
        m.gain.gain.setValueAtTime(newAmp, t);
        m.gain.gain.exponentialRampToValueAtTime(0.0001, t + decay);
      });
    }

    // Convert a frequency in Hz to a note name (e.g. 523 → "C5")
    function freqToNote(freq) {
      const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const noteNum = Math.round(12 * Math.log2(freq / 440) + 69);
      const octave  = Math.floor(noteNum / 12) - 1;
      const name    = noteNames[((noteNum % 12) + 12) % 12];
      return `${name}${octave}`;
    }

    /* ============================================================
       Visual feedback
       ============================================================ */
    const bellIcon  = document.getElementById('bellIcon');
    const statusMsg = document.getElementById('statusMsg');
    let ringTimeout = null;

    function triggerVisual() {
      bellIcon.classList.remove('ring');
      void bellIcon.offsetWidth; // force reflow to restart animation
      bellIcon.classList.add('ring');
      clearTimeout(ringTimeout);
      ringTimeout = setTimeout(() => bellIcon.classList.remove('ring'), 520);

      statusMsg.textContent = '🔔 Ding!';
      statusMsg.classList.add('active');
      clearTimeout(statusMsg._t);
      statusMsg._t = setTimeout(() => {
        statusMsg.textContent = 'Rist telefonen for å ringe bjellen!';
        statusMsg.classList.remove('active');
      }, 1000);
    }

    function ring() {
      ringBell();
      triggerVisual();
    }

    /* ============================================================
       Shake detection via DeviceMotionEvent
       ============================================================ */

    // Sensitivity levels: threshold in m/s² (above this triggers ring)
    const SENSITIVITY_LEVELS = [40, 28, 18, 12, 7];
    const SENSITIVITY_LABELS = ['Veldig lav', 'Lav', 'Middels', 'Høy', 'Veldig høy'];
    let shakeThreshold = SENSITIVITY_LEVELS[2]; // default: medium

    // Rising-edge detection: fire once each time acceleration crosses
    // the threshold from below.  A short debounce guards against re-firing
    // if the magnitude bounces near the threshold within the same gesture.
    const DEBOUNCE_MS = 80;
    let lastRingTime  = 0;
    let prevMagnitude = 0;

    // Bar display
    const shakeBar = document.getElementById('shakeBar');
    const shakeVal = document.getElementById('shakeVal');
    // Normalise against a reasonable max for the bar (higher of threshold*2 or 40)
    const BAR_MAX = 60;

    function onDeviceMotion(e) {
      const acc = e.accelerationIncludingGravity || e.acceleration;
      if (!acc) return;

      const ax = acc.x || 0;
      const ay = acc.y || 0;
      const az = acc.z || 0;
      const magnitude = Math.sqrt(ax * ax + ay * ay + az * az);

      // Update bar
      const pct = Math.min(100, (magnitude / BAR_MAX) * 100);
      shakeBar.style.width = pct + '%';
      shakeBar.classList.toggle('over', magnitude >= shakeThreshold);
      shakeVal.textContent = Math.round(magnitude);

      // Trigger on the rising edge of the threshold crossing so that each
      // distinct shake fires once – even rapid successive shakes while the
      // bell is already ringing (the physical model accumulates energy).
      const now = Date.now();
      if (magnitude >= shakeThreshold && prevMagnitude < shakeThreshold &&
          (now - lastRingTime) > DEBOUNCE_MS) {
        lastRingTime = now;
        ring();
      }
      prevMagnitude = magnitude;
    }

    /* ---- Sensitivity slider ---- */
    const sensSlider = document.getElementById('sensSlider');
    const sensLabel  = document.getElementById('sensLabel');

    sensSlider.addEventListener('input', () => {
      const idx = Number(sensSlider.value) - 1;
      shakeThreshold = SENSITIVITY_LEVELS[idx];
      sensLabel.textContent = SENSITIVITY_LABELS[idx];
    });
    // init label
    sensLabel.textContent = SENSITIVITY_LABELS[Number(sensSlider.value) - 1];

    /* ---- Volume slider ---- */
    document.getElementById('volSlider').addEventListener('input', e => {
      volume = e.target.value / 100;
      if (masterGainNode) {
        masterGainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
      }
    });

    /* ---- Frequency slider ---- */
    const freqSlider = document.getElementById('freqSlider');
    const freqLabel  = document.getElementById('freqLabel');

    freqSlider.addEventListener('input', () => {
      fundamental = Number(freqSlider.value);
      freqLabel.textContent = `${freqToNote(fundamental)} · ${fundamental} Hz`;
      if (physModel) {
        const t = audioCtx.currentTime;
        physModel.forEach((m, i) => {
          m.osc.frequency.setTargetAtTime(fundamental * PARTIALS[i].ratio, t, 0.02);
        });
      }
    });
    // Init label to match default value
    freqLabel.textContent = `${freqToNote(fundamental)} · ${Math.round(fundamental)} Hz`;

    /* ---- Manual ring button + clicking bell icon ---- */
    document.getElementById('btnRing').addEventListener('click', ring);
    bellIcon.addEventListener('click', ring);

    /* ---- Register motion listener ---- */
    const permNote = document.getElementById('permNote');

    function startMotionListener() {
      window.addEventListener('devicemotion', onDeviceMotion);
    }

    // iOS 13+ requires explicit permission for DeviceMotionEvent
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      // Show permission button for iOS
      permNote.hidden = false;
      document.getElementById('btnPermission').addEventListener('click', () => {
        DeviceMotionEvent.requestPermission()
          .then(state => {
            if (state === 'granted') {
              startMotionListener();
              permNote.hidden = true;
              statusMsg.textContent = 'Bevegelsessensor aktiv – rist telefonen!';
            } else {
              statusMsg.textContent = 'Tillatelse avslått. Bruk knappen nedenfor.';
            }
          })
          .catch(() => {
            statusMsg.textContent = 'Kunne ikke be om tillatelse.';
          });
      });
    } else if (typeof DeviceMotionEvent !== 'undefined') {
      // Android / desktop: start immediately
      startMotionListener();
    } else {
      statusMsg.textContent = 'Bevegelsessensor ikke tilgjengelig – bruk knappen.';
    }

    /* ---- Keyboard shortcut (Space / B) ---- */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space' || e.code === 'KeyB') {
        e.preventDefault();
        ring();
      }
    });
  })();
  </script>
</body>
</html>
