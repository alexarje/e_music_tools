<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loudness Meter</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .loudness-container {
            max-width: 400px;
            margin: 2em auto;
            padding: 2em;
            background: #222;
            border-radius: 1em;
            color: #fff;
            text-align: center;
        }
        .loudness-bar {
            width: 100%;
            height: 30px;
            background: #444;
            border-radius: 15px;
            margin: 1em 0;
            overflow: hidden;
        }
        .loudness-level {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
            width: 0%;
            border-radius: 15px;
            transition: width 0.1s;
        }
        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #aaa;
        }
        .db-value {
            font-size: 2em;
            font-weight: bold;
            margin: 0.5em 0;
        }
    </style>
</head>
<body>
    <div class="loudness-container">
        <h1>Loudness Meter</h1>
        <button id="start-btn">Start Measurement</button>
        <div class="db-value" id="db-value">-- dB</div>
        <div class="loudness-bar">
            <div class="loudness-level" id="loudness-level"></div>
        </div>
        <div class="scale-labels">
            <span>-60 dB</span>
            <span>-30 dB</span>
            <span>0 dB</span>
        </div>
        <p style="margin-top:2em; font-size:0.9em; color:#bbb;">
            This tool measures loudness (RMS) from your microphone and reports the value in decibels (dBFS).<br>
            0 dBFS is the maximum possible digital level.
        </p>
    </div>
    <script src="loudness.js"></script>
</body>
</html>
