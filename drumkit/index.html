<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drum Kit – e_music_tools</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .drum-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ---- pad grid ---- */
    .pad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }

    .pad {
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      transition: filter .06s, transform .06s, box-shadow .06s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .pad .pad-icon  { font-size: 2rem; pointer-events: none; }
    .pad .pad-label { font-size: .8rem; font-weight: 600; pointer-events: none; }
    .pad .pad-key   {
      position: absolute;
      bottom: 6px; right: 8px;
      font-size: .7rem;
      background: rgba(0,0,0,.4);
      padding: 1px 5px;
      border-radius: 4px;
      pointer-events: none;
    }

    .pad:active, .pad.hit {
      filter: brightness(1.4);
      transform: scale(.95);
      box-shadow: 0 0 20px currentColor;
    }

    /* individual pad colours */
    .pad-kick     { background: #3d1a1a; color: #ff6b6b; border-color: #ff6b6b44; }
    .pad-snare    { background: #1a2e3d; color: #6bb0ff; border-color: #6bb0ff44; }
    .pad-hihat-c  { background: #1a3d2e; color: #6bffc8; border-color: #6bffc844; }
    .pad-hihat-o  { background: #1a3d1a; color: #a8ff6b; border-color: #a8ff6b44; }
    .pad-tom-hi   { background: #2e1a3d; color: #c86bff; border-color: #c86bff44; }
    .pad-tom-mid  { background: #3d2e1a; color: #ffbc6b; border-color: #ffbc6b44; }
    .pad-tom-lo   { background: #3d1a2e; color: #ff6bbc; border-color: #ff6bbc44; }
    .pad-crash    { background: #2e3d1a; color: #d4ff6b; border-color: #d4ff6b44; }

    /* ---- info bar ---- */
    .last-hit {
      font-size: 1.1rem;
      color: var(--muted);
      min-height: 1.5em;
      text-align: center;
      transition: color .15s;
    }
    .last-hit.active { color: var(--text); }

    /* ---- volume + hint ---- */
    .vol-wrap {
      display: flex;
      align-items: center;
      gap: .75rem;
      width: 100%;
      max-width: 300px;
    }
    .vol-wrap label { font-size: .85rem; color: var(--muted); white-space: nowrap; }

    .kb-hint {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="../index.html">🎵 e_music_tools</a>
    <a href="../metronome/">Metronom</a>
    <a href="../tuner/">Tuner</a>
    <a href="../piano/">Piano</a>
    <a href="../drumkit/" class="active">Trommesett</a>
  </nav>

  <main>
    <div class="card">
      <div class="drum-wrap">

        <!-- last hit -->
        <div class="last-hit" id="lastHit">Hit a pad to start playing…</div>

        <!-- pads -->
        <div class="pad-grid" id="padGrid">
          <!-- filled by JS -->
        </div>

        <!-- volume -->
        <div class="vol-wrap">
          <label>🔈</label>
          <input type="range" id="volSlider" min="0" max="100" value="80" />
          <label>🔊</label>
        </div>

        <!-- keyboard hints -->
        <div class="kb-hint">
          <strong>Keyboard shortcuts:</strong><br/>
          <kbd>A</kbd> Kick &nbsp;
          <kbd>S</kbd> Snare &nbsp;
          <kbd>D</kbd> Hi-hat (closed) &nbsp;
          <kbd>F</kbd> Hi-hat (open)<br/>
          <kbd>G</kbd> Tom Hi &nbsp;
          <kbd>H</kbd> Tom Mid &nbsp;
          <kbd>J</kbd> Tom Low &nbsp;
          <kbd>K</kbd> Crash
        </div>
      </div>
    </div>
  </main>


  <script>
  (() => {
    'use strict';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let volume = 0.8;

    /* ================================================================
       Drum synthesis functions – all use Web Audio API primitives
       ================================================================ */

    function kick() {
      const t = audioCtx.currentTime;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(0.001, t + 0.5);
      gain.gain.setValueAtTime(volume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
    }

    function snare() {
      const t = audioCtx.currentTime;
      // noise buffer
      const bufSize = audioCtx.sampleRate * 0.2;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(volume * 0.7, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      noise.connect(noiseGain); noiseGain.connect(audioCtx.destination);
      noise.start(t);

      // body tone
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 200;
      gain.gain.setValueAtTime(volume * 0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.1);
    }

    function hihat(open = false) {
      const t = audioCtx.currentTime;
      const duration = open ? 0.4 : 0.05;
      const bufSize = Math.floor(audioCtx.sampleRate * duration);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

      const source = audioCtx.createBufferSource();
      source.buffer = buf;

      // high-pass to thin it out
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 7000;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume * 0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

      source.connect(hp); hp.connect(gain); gain.connect(audioCtx.destination);
      source.start(t);
    }

    function tom(freqHz) {
      const t = audioCtx.currentTime;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(freqHz, t);
      osc.frequency.exponentialRampToValueAtTime(freqHz * 0.3, t + 0.3);
      gain.gain.setValueAtTime(volume * 0.8, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    }

    function crash() {
      const t = audioCtx.currentTime;
      const bufSize = Math.floor(audioCtx.sampleRate * 1.2);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

      const source = audioCtx.createBufferSource();
      source.buffer = buf;

      const hp = audioCtx.createBiquadFilter();
      hp.type = 'bandpass';
      hp.frequency.value = 5000;
      hp.Q.value = 0.5;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume * 0.5, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

      source.connect(hp); hp.connect(gain); gain.connect(audioCtx.destination);
      source.start(t);
    }

    /* ---- pad definitions ---- */
    const PADS = [
      { id: 'kick',    label: 'Kick',       icon: '🥁', cls: 'pad-kick',    key: 'A', code: 'KeyA',  fn: () => kick() },
      { id: 'snare',   label: 'Snare',      icon: '🪘', cls: 'pad-snare',   key: 'S', code: 'KeyS',  fn: () => snare() },
      { id: 'hihat-c', label: 'Hi-hat ×',   icon: '🔔', cls: 'pad-hihat-c', key: 'D', code: 'KeyD',  fn: () => hihat(false) },
      { id: 'hihat-o', label: 'Hi-hat ○',   icon: '🔔', cls: 'pad-hihat-o', key: 'F', code: 'KeyF',  fn: () => hihat(true) },
      { id: 'tom-hi',  label: 'Tom Hi',     icon: '🎵', cls: 'pad-tom-hi',  key: 'G', code: 'KeyG',  fn: () => tom(300) },
      { id: 'tom-mid', label: 'Tom Mid',    icon: '🎵', cls: 'pad-tom-mid', key: 'H', code: 'KeyH',  fn: () => tom(200) },
      { id: 'tom-lo',  label: 'Tom Low',    icon: '🎵', cls: 'pad-tom-lo',  key: 'J', code: 'KeyJ',  fn: () => tom(120) },
      { id: 'crash',   label: 'Crash',      icon: '💥', cls: 'pad-crash',   key: 'K', code: 'KeyK',  fn: () => crash() },
    ];

    /* ---- build pad DOM ---- */
    const grid    = document.getElementById('padGrid');
    const lastHit = document.getElementById('lastHit');

    const padEls = {};
    PADS.forEach(p => {
      const el = document.createElement('div');
      el.className = `pad ${p.cls}`;
      el.dataset.id = p.id;
      el.innerHTML = `
        <span class="pad-icon">${p.icon}</span>
        <span class="pad-label">${p.label}</span>
        <span class="pad-key">${p.key}</span>
      `;
      grid.appendChild(el);
      padEls[p.id] = el;
    });

    /* ---- trigger ---- */
    function triggerPad(pad) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      pad.fn();

      const el = padEls[pad.id];
      el.classList.add('hit');
      setTimeout(() => el.classList.remove('hit'), 120);

      lastHit.textContent = `${pad.icon}  ${pad.label}`;
      lastHit.classList.add('active');
      clearTimeout(lastHit._t);
      lastHit._t = setTimeout(() => lastHit.classList.remove('active'), 600);
    }

    /* ---- pointer events ---- */
    grid.addEventListener('pointerdown', e => {
      const padEl = e.target.closest('[data-id]');
      if (!padEl) return;
      e.preventDefault();
      const pad = PADS.find(p => p.id === padEl.dataset.id);
      if (pad) triggerPad(pad);
    });

    /* ---- keyboard ---- */
    const codeMap = {};
    PADS.forEach(p => { codeMap[p.code] = p; });

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.repeat) return;
      const pad = codeMap[e.code];
      if (pad) { e.preventDefault(); triggerPad(pad); }
    });

    /* ---- volume ---- */
    document.getElementById('volSlider').addEventListener('input', e => {
      volume = e.target.value / 100;
    });
  })();
  </script>
</body>
</html>
